openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WinMoja Campaign Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: voters
    description: Voter intelligence database
  - name: supporters
    description: Supporter management
  - name: requests
    description: Constituent request & petition management
  - name: broadcasts
    description: Live broadcast channel
  - name: referrals
    description: Viral poster & referral engine
  - name: volunteers
    description: Volunteer & agent coordinator
  - name: finance
    description: Campaign finance tracker
  - name: manifesto
    description: Manifesto & policy engine
  - name: dashboard
    description: Dashboard aggregates
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get campaign summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/ward-support:
    get:
      operationId: getWardSupport
      tags: [dashboard]
      summary: Get support levels by ward for the live map
      responses:
        "200":
          description: Ward support data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WardSupport"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent campaign activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # VOTERS
  /voters:
    get:
      operationId: listVoters
      tags: [voters]
      summary: List voters with filtering
      parameters:
        - name: ward
          in: query
          schema:
            type: string
        - name: supportLevel
          in: query
          schema:
            type: string
            enum: [confirmed, leaning, undecided, opposed, unknown]
        - name: pollingStation
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated voter list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoterListResponse"
    post:
      operationId: createVoter
      tags: [voters]
      summary: Add a voter record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoterBody"
      responses:
        "201":
          description: Voter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voter"

  /voters/{id}:
    get:
      operationId: getVoter
      tags: [voters]
      summary: Get voter by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Voter details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voter"
    patch:
      operationId: updateVoter
      tags: [voters]
      summary: Update voter record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVoterBody"
      responses:
        "200":
          description: Updated voter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voter"

  /voters/stats/by-ward:
    get:
      operationId: getVoterStatsByWard
      tags: [voters]
      summary: Get voter counts and support breakdown by ward
      responses:
        "200":
          description: Ward statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WardStats"

  # REQUESTS
  /requests:
    get:
      operationId: listRequests
      tags: [requests]
      summary: List constituent requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [received, under_review, approved, declined, fulfilled]
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestListResponse"
    post:
      operationId: createRequest
      tags: [requests]
      summary: Submit a new constituent request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequestBody"
      responses:
        "201":
          description: Request created with reference number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstituentRequest"

  /requests/{id}:
    get:
      operationId: getRequest
      tags: [requests]
      summary: Get request by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstituentRequest"
    patch:
      operationId: updateRequest
      tags: [requests]
      summary: Update request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRequestBody"
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstituentRequest"

  /requests/stats/summary:
    get:
      operationId: getRequestStats
      tags: [requests]
      summary: Get request counts by status and category
      responses:
        "200":
          description: Request statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestStats"

  # BROADCASTS
  /broadcasts:
    get:
      operationId: listBroadcasts
      tags: [broadcasts]
      summary: List broadcasts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Broadcasts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastListResponse"
    post:
      operationId: createBroadcast
      tags: [broadcasts]
      summary: Post a new broadcast
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBroadcastBody"
      responses:
        "201":
          description: Broadcast created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broadcast"

  /broadcasts/{id}:
    get:
      operationId: getBroadcast
      tags: [broadcasts]
      summary: Get broadcast by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Broadcast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broadcast"
    delete:
      operationId: deleteBroadcast
      tags: [broadcasts]
      summary: Delete a broadcast
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # REFERRALS
  /referrals:
    get:
      operationId: listReferrals
      tags: [referrals]
      summary: List referral records
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Referrals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralListResponse"

  /referrals/leaderboard:
    get:
      operationId: getReferralLeaderboard
      tags: [referrals]
      summary: Get top referrers leaderboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # VOLUNTEERS
  /volunteers:
    get:
      operationId: listVolunteers
      tags: [volunteers]
      summary: List volunteers and agents
      parameters:
        - name: ward
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Volunteers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerListResponse"
    post:
      operationId: createVolunteer
      tags: [volunteers]
      summary: Register a volunteer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolunteerBody"
      responses:
        "201":
          description: Volunteer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  /volunteers/{id}:
    patch:
      operationId: updateVolunteer
      tags: [volunteers]
      summary: Update volunteer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVolunteerBody"
      responses:
        "200":
          description: Updated volunteer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  # FINANCE
  /finance/transactions:
    get:
      operationId: listTransactions
      tags: [finance]
      summary: List finance transactions
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expenditure]
        - name: category
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
    post:
      operationId: createTransaction
      tags: [finance]
      summary: Log a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /finance/summary:
    get:
      operationId: getFinanceSummary
      tags: [finance]
      summary: Get financial summary (income, expenditure, balance)
      responses:
        "200":
          description: Finance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceSummary"

  # MANIFESTO
  /manifesto:
    get:
      operationId: listManifestoItems
      tags: [manifesto]
      summary: List manifesto policy items
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Manifesto items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManifestoItem"
    post:
      operationId: createManifestoItem
      tags: [manifesto]
      summary: Create a manifesto item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManifestoItemBody"
      responses:
        "201":
          description: Manifesto item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestoItem"

  /manifesto/{id}:
    patch:
      operationId: updateManifestoItem
      tags: [manifesto]
      summary: Update a manifesto item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateManifestoItemBody"
      responses:
        "200":
          description: Updated manifesto item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestoItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [admin, coordinator, agent, finance, viewer]
        ward:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, username, fullName, role, createdAt]

    DashboardSummary:
      type: object
      properties:
        totalVoters:
          type: integer
        confirmedSupporters:
          type: integer
        leaningSupporters:
          type: integer
        pendingRequests:
          type: integer
        totalVolunteers:
          type: integer
        totalReferrals:
          type: integer
        campaignBalance:
          type: number
        broadcastsThisMonth:
          type: integer
      required: [totalVoters, confirmedSupporters, leaningSupporters, pendingRequests, totalVolunteers, totalReferrals, campaignBalance, broadcastsThisMonth]

    WardSupport:
      type: object
      properties:
        ward:
          type: string
        total:
          type: integer
        confirmed:
          type: integer
        leaning:
          type: integer
        undecided:
          type: integer
        opposed:
          type: integer
        supportPercent:
          type: number
        zone:
          type: string
          enum: [green, yellow, red]
      required: [ward, total, confirmed, leaning, undecided, opposed, supportPercent, zone]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, type, description, createdAt]

    Voter:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        idNumber:
          type: string
        ward:
          type: string
        village:
          type: string
          nullable: true
        pollingStation:
          type: string
        phone:
          type: string
          nullable: true
        supportLevel:
          type: string
          enum: [confirmed, leaning, undecided, opposed, unknown]
        notes:
          type: string
          nullable: true
        hasVoted:
          type: boolean
        lastContactedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, fullName, idNumber, ward, pollingStation, supportLevel, hasVoted, createdAt]

    CreateVoterBody:
      type: object
      properties:
        fullName:
          type: string
        idNumber:
          type: string
        ward:
          type: string
        village:
          type: string
        pollingStation:
          type: string
        phone:
          type: string
        supportLevel:
          type: string
          enum: [confirmed, leaning, undecided, opposed, unknown]
        notes:
          type: string
      required: [fullName, idNumber, ward, pollingStation]

    UpdateVoterBody:
      type: object
      properties:
        phone:
          type: string
        supportLevel:
          type: string
          enum: [confirmed, leaning, undecided, opposed, unknown]
        notes:
          type: string
        hasVoted:
          type: boolean
        village:
          type: string

    VoterListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Voter"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    WardStats:
      type: object
      properties:
        ward:
          type: string
        totalVoters:
          type: integer
        confirmed:
          type: integer
        leaning:
          type: integer
        undecided:
          type: integer
        opposed:
          type: integer
        unknown:
          type: integer
        voted:
          type: integer
      required: [ward, totalVoters, confirmed, leaning, undecided, opposed, unknown, voted]

    ConstituentRequest:
      type: object
      properties:
        id:
          type: integer
        referenceNumber:
          type: string
        fullName:
          type: string
        idNumber:
          type: string
        phone:
          type: string
          nullable: true
        category:
          type: string
          enum: [bursary, medical, business, school_fees, other]
        description:
          type: string
        status:
          type: string
          enum: [received, under_review, approved, declined, fulfilled]
        ward:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, referenceNumber, fullName, idNumber, category, description, status, createdAt, updatedAt]

    CreateRequestBody:
      type: object
      properties:
        fullName:
          type: string
        idNumber:
          type: string
        phone:
          type: string
        category:
          type: string
          enum: [bursary, medical, business, school_fees, other]
        description:
          type: string
        ward:
          type: string
      required: [fullName, idNumber, category, description]

    UpdateRequestBody:
      type: object
      properties:
        status:
          type: string
          enum: [received, under_review, approved, declined, fulfilled]
        notes:
          type: string

    RequestListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ConstituentRequest"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    RequestStats:
      type: object
      properties:
        byStatus:
          type: object
          additionalProperties:
            type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
        total:
          type: integer
      required: [byStatus, byCategory, total]

    Broadcast:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [text, announcement, alert, rally, update]
        imageUrl:
          type: string
          nullable: true
        authorId:
          type: integer
        authorName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, content, type, authorId, authorName, createdAt]

    CreateBroadcastBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [text, announcement, alert, rally, update]
        imageUrl:
          type: string
      required: [title, content, type]

    BroadcastListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Broadcast"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    Referral:
      type: object
      properties:
        id:
          type: integer
        referrerName:
          type: string
        referrerPhone:
          type: string
        referredName:
          type: string
          nullable: true
        referredPhone:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, registered, attended_rally]
        airtimeEarned:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, referrerName, referrerPhone, status, airtimeEarned, createdAt]

    ReferralListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Referral"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        referrerName:
          type: string
        referrerPhone:
          type: string
        totalReferrals:
          type: integer
        totalAirtimeEarned:
          type: number
      required: [rank, referrerName, referrerPhone, totalReferrals, totalAirtimeEarned]

    Volunteer:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        ward:
          type: string
        role:
          type: string
          enum: [ward_coordinator, polling_agent, mobilizer, driver, other]
        pollingStation:
          type: string
          nullable: true
        isActive:
          type: boolean
        lastCheckIn:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, fullName, phone, ward, role, isActive, createdAt]

    CreateVolunteerBody:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        ward:
          type: string
        role:
          type: string
          enum: [ward_coordinator, polling_agent, mobilizer, driver, other]
        pollingStation:
          type: string
        notes:
          type: string
      required: [fullName, phone, ward, role]

    UpdateVolunteerBody:
      type: object
      properties:
        role:
          type: string
          enum: [ward_coordinator, polling_agent, mobilizer, driver, other]
        isActive:
          type: boolean
        pollingStation:
          type: string
        notes:
          type: string
        lastCheckIn:
          type: string
          format: date-time

    VolunteerListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Volunteer"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [income, expenditure]
        category:
          type: string
        description:
          type: string
        amount:
          type: number
        source:
          type: string
          nullable: true
        recordedById:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, type, category, description, amount, recordedById, createdAt]

    CreateTransactionBody:
      type: object
      properties:
        type:
          type: string
          enum: [income, expenditure]
        category:
          type: string
        description:
          type: string
        amount:
          type: number
        source:
          type: string
      required: [type, category, description, amount]

    TransactionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    FinanceSummary:
      type: object
      properties:
        totalIncome:
          type: number
        totalExpenditure:
          type: number
        balance:
          type: number
        byCategory:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              type:
                type: string
              total:
                type: number
            required: [category, type, total]
      required: [totalIncome, totalExpenditure, balance, byCategory]

    ManifestoItem:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
          enum: [education, health, roads, water, youth, security, agriculture, economy]
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pledge, in_progress, fulfilled]
        priority:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, category, title, description, status, priority, createdAt, updatedAt]

    CreateManifestoItemBody:
      type: object
      properties:
        category:
          type: string
          enum: [education, health, roads, water, youth, security, agriculture, economy]
        title:
          type: string
        description:
          type: string
        priority:
          type: integer
      required: [category, title, description]

    UpdateManifestoItemBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pledge, in_progress, fulfilled]
        priority:
          type: integer
