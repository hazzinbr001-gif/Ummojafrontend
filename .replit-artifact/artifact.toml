kind = "web"
previewPath = "/"
title = "WinMoja Campaign Platform"
version = "1.0.0"
id = "artifacts/winmoja"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21536

[services.development]
run = "pnpm --filter @workspace/winmoja run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/winmoja", "run", "build" ]
publicDir = "artifacts/winmoja/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21536"
BASE_PATH = "/"
